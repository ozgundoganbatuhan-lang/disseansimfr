<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DişSeansım — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--tl:#0D9488;--tl2:#14B8A6;--tl-l:#F0FDF9;--tl-b:#CCFBF1;--am:#D97706;--am-l:#FFFBEB;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--ink4:#9CA3AF;--red:#EF4444;--red-b:rgba(239,68,68,.08);--bdr:#E5E7EB;--bdr2:#F3F4F6;--D:'Fraunces',Georgia,serif;--B:'Plus Jakarta Sans',system-ui,sans-serif}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--B);background:linear-gradient(135deg,var(--tl-l) 0%,white 55%,#F9FAFB 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:440px}
.logo{text-align:center;margin-bottom:32px}
.logo-ic{width:52px;height:52px;background:linear-gradient(135deg,var(--tl),#0F766E);border-radius:14px;display:grid;place-items:center;font-size:26px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(13,148,136,.28)}
.logo-t{font-family:var(--D);font-size:26px;font-style:italic;font-weight:600;color:var(--ink);letter-spacing:-.5px}
.logo-s{font-size:13px;color:var(--ink4);margin-top:4px}
.card{background:white;border:1px solid var(--bdr);border-radius:20px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.03);position:relative}
.tabs{display:flex;gap:3px;background:#F3F4F6;border-radius:10px;padding:3px;margin-bottom:28px}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:14px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .15s}
.tab.on{background:white;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form-t{font-family:var(--D);font-size:22px;font-style:italic;font-weight:600;color:var(--ink);margin-bottom:6px;letter-spacing:-.3px}
.form-s{font-size:14px;color:var(--ink3);margin-bottom:24px;line-height:1.6}
.fr{margin-bottom:16px}
label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
input,select{width:100%;background:white;border:1.5px solid var(--bdr);border-radius:8px;padding:11px 14px;font-size:14.5px;font-family:var(--B);color:var(--ink);outline:none;transition:all .15s;-webkit-appearance:none}
input::placeholder{color:var(--ink4)}
input:focus,select:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-sub{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:700;color:white;background:var(--tl);border:none;cursor:pointer;transition:all .18s;font-family:var(--B);margin-top:8px}
.btn-sub:hover{background:#0F766E;transform:translateY(-1px);box-shadow:0 4px 14px rgba(13,148,136,.32)}
.btn-sub:disabled{opacity:.6;transform:none;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink4);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.ck-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.ck-row label{text-transform:none;letter-spacing:0;font-size:13px;font-weight:400;color:var(--ink3);cursor:pointer;line-height:1.6}
.ck-row input{margin-top:2px;flex-shrink:0;width:auto!important}
.ck-row a{color:var(--tl);font-weight:600}
.ck-row a:hover{text-decoration:underline}
.err{display:none;background:var(--red-b);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13.5px;margin-bottom:14px}
.err.on{display:block}
.ok-msg{display:none;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#059669;padding:10px 14px;border-radius:8px;font-size:13.5px;margin-bottom:14px}
.ok-msg.on{display:block}
.ldr{display:none;position:absolute;inset:0;background:rgba(255,255,255,.85);border-radius:20px;z-index:10;align-items:center;justify-content:center;font-size:26px}
.ldr.on{display:flex}
.trust{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap}
.ti{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink4)}
.ti::before{content:'✓';color:var(--tl);font-weight:700}
.back{text-align:center;margin-top:20px;font-size:13.5px;color:var(--ink3)}
.back a{color:var(--tl);font-weight:600}
.back a:hover{text-decoration:underline}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-ic">🦷</div>
    <div class="logo-t">DişSeansım</div>
    <div class="logo-s">Türkiye'nin Modern Diş Kliniği Yazılımı</div>
  </div>
  <div class="card">
    <div class="ldr" id="ldr"><span class="sp">↻</span></div>
    <div class="tabs">
      <div class="tab on" id="tab-in" onclick="sw('in')">Giriş Yap</div>
      <div class="tab" id="tab-reg" onclick="sw('reg')">Kayıt Ol</div>
    </div>
    <div id="err-msg" class="err"></div>
    <div id="ok-msg" class="ok-msg"></div>

    <!-- LOGIN -->
    <div id="f-in">
      <div class="form-t">Tekrar hoş geldiniz</div>
      <div class="form-s">Kliniğinize devam etmek için giriş yapın.</div>
      <div class="fr"><label>E-posta</label><input type="email" id="in-email" placeholder="hekim@klinik.com" autocomplete="email"></div>
      <div class="fr"><label>Şifre</label><input type="password" id="in-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <div style="text-align:right;margin-bottom:20px"><a href="#" style="font-size:13px;color:var(--tl);font-weight:600">Şifremi unuttum</a></div>
      <button class="btn-sub" onclick="doLogin()">Giriş Yap →</button>
    </div>

    <!-- REGISTER -->
    <div id="f-reg" style="display:none">
      <div class="form-t">14 gün ücretsiz başlayın</div>
      <div class="form-s">Kredi kartı gerekmez. 5 dakikada kurulum.</div>
      <div class="g2">
        <div class="fr"><label>Ad Soyad *</label><input type="text" id="rg-name" placeholder="Dr. Adınız Soyadınız"></div>
        <div class="fr"><label>Unvan</label><select id="rg-title"><option>Dr.</option><option>Uzm. Dr.</option><option>Prof. Dr.</option><option>Doç. Dr.</option></select></div>
      </div>
      <div class="fr"><label>Klinik Adı</label><input type="text" id="rg-clinic" placeholder="Örn: Güven Ağız Sağlığı Kliniği"></div>
      <div class="fr"><label>E-posta *</label><input type="email" id="rg-email" placeholder="hekim@klinik.com" autocomplete="email"></div>
      <div class="fr"><label>Şifre * (min 8 karakter)</label><input type="password" id="rg-pass" placeholder="Güçlü bir şifre seçin" autocomplete="new-password"></div>
      <div class="ck-row">
        <input type="checkbox" id="rg-terms">
        <label for="rg-terms"><a href="#">Kullanım Koşulları</a>'nı ve <a href="#">Gizlilik Politikası</a>'nı okudum, kabul ediyorum.</label>
      </div>
      <button class="btn-sub" onclick="doReg()">Ücretsiz Başla →</button>
    </div>
  </div>
  <div class="trust">
    <div class="ti">KVKK Uyumlu</div>
    <div class="ti">256-bit SSL</div>
    <div class="ti">TR Sunucu</div>
  </div>
  <div class="back"><a href="index.html">← DişSeansım'a dön</a></div>
</div>

<script>
var B='https://disseansimback-production.up.railway.app';

function sw(t){
  document.getElementById('tab-in').classList.toggle('on',t==='in');
  document.getElementById('tab-reg').classList.toggle('on',t==='reg');
  document.getElementById('f-in').style.display=t==='in'?'block':'none';
  document.getElementById('f-reg').style.display=t==='reg'?'block':'none';
  hideMsg();
}
function showErr(m){var e=document.getElementById('err-msg');e.textContent=m;e.classList.add('on');document.getElementById('ok-msg').classList.remove('on');}
function showOk(m){var e=document.getElementById('ok-msg');e.textContent=m;e.classList.add('on');document.getElementById('err-msg').classList.remove('on');}
function hideMsg(){document.getElementById('err-msg').classList.remove('on');document.getElementById('ok-msg').classList.remove('on');}
function setLoad(v){document.getElementById('ldr').classList.toggle('on',v);}

async function doLogin(){
  var email=document.getElementById('in-email').value.trim(),pass=document.getElementById('in-pass').value;
  if(!email||!pass){showErr('E-posta ve şifre zorunlu');return;}
  setLoad(true);
  try{
    var r=await fetch(B+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    var d=await r.json();
    if(!r.ok||d.error){showErr(d.error||'Giriş başarısız');setLoad(false);return;}
    localStorage.setItem('ds_tok',d.accessToken||d.token);
    localStorage.setItem('ds_tid',d.user?.membership?.tenantId||d.tenantId||'');
    if(d.refreshToken)localStorage.setItem('ds_ref',d.refreshToken);
    location.href='app.html';
  }catch(e){showErr('Bağlantı hatası. Lütfen tekrar deneyin.');setLoad(false);}
}

async function doReg(){
  var name=document.getElementById('rg-name').value.trim(),email=document.getElementById('rg-email').value.trim(),pass=document.getElementById('rg-pass').value;
  var clinic=document.getElementById('rg-clinic').value.trim(),title=document.getElementById('rg-title').value;
  if(!name||!email||!pass){showErr('Ad, e-posta ve şifre zorunlu');return;}
  if(pass.length<8){showErr('Şifre en az 8 karakter olmalı');return;}
  if(!document.getElementById('rg-terms').checked){showErr('Kullanım koşullarını kabul etmelisiniz');return;}
  setLoad(true);
  try{
    var r=await fetch(B+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pass,clinicName:clinic||name+' Kliniği',title,terms:true})});
    var d=await r.json();
    if(!r.ok||d.error){showErr(d.error||'Kayıt başarısız');setLoad(false);return;}
    localStorage.setItem('ds_tok',d.accessToken||d.token);
    localStorage.setItem('ds_tid',d.user?.membership?.tenantId||d.tenantId||'');
    if(d.refreshToken)localStorage.setItem('ds_ref',d.refreshToken);
    showOk('Hoş geldiniz! Yönlendiriliyorsunuz…');
    setTimeout(()=>location.href='app.html',1200);
  }catch(e){showErr('Bağlantı hatası. Lütfen tekrar deneyin.');setLoad(false);}
}

// Enter key
document.addEventListener('keydown',e=>{if(e.key==='Enter'){var active=document.getElementById('f-in').style.display!=='none';active?doLogin():doReg();}});
// URL param
var p=new URLSearchParams(location.search);
if(p.get('action')==='register')sw('reg');
// Already logged in
(async function(){
  var tok=localStorage.getItem('ds_tok'),tid=localStorage.getItem('ds_tid');
  if(!tok||!tid)return;
  try{
    var r=await fetch('https://disseansimback-production.up.railway.app/api/auth/me',{
      headers:{'Authorization':'Bearer '+tok,'X-Tenant-ID':tid},
      signal:AbortSignal.timeout?AbortSignal.timeout(6000):undefined
    });
    if(r.ok){location.href='app.html';return;}
    if(r.status===401){localStorage.removeItem('ds_tok');localStorage.removeItem('ds_tid');localStorage.removeItem('ds_ref');}
  }catch(e){}
})();
</script>
</body>
</html>
